<!DOCTYPE html>
<html>
<head>
  <title>BFHL Visualizer</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    textarea {
      width: 60%;
      height: 120px;
      border-radius: 10px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    pre {
      text-align: left;
      background: #1e293b;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      overflow-x: auto;
    }
  </style>
</head>

<body>

<h1>BFHL API Tester</h1>

<textarea id="input">
A->B, A->C, B->D
</textarea>

<br>

<button onclick="sendData()">Submit</button>

<pre id="output">Response will appear here...</pre>

<script>
async function sendData() {
  const raw = document.getElementById("input").value;

  const data = raw.split(",").map(x => x.trim());

  try {
    const res = await fetch("https://bfhl-visualizer-backend.onrender.com/bfhl", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ data })
    });

    if (!res.ok) {
       throw new Error("API error");
    }

    const result = await res.json();

    document.getElementById("output").innerText =
      JSON.stringify(result, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "Failed to connect. Check backend or network.";
  }
}
</script>

</body>
</html>
